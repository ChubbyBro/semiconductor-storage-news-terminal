<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semiconductor Storage Financial Terminal</title>
    <style>
      :root {
        --bg: #020617;
        --line: #1e293b;
        --text: #f8fafc;
        --muted: #94a3b8;
        --red: #ef4444;
        --blue: #38bdf8;
        --green: #22c55e;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "IBM Plex Sans", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      }

      body {
        background-image: linear-gradient(rgba(30, 41, 59, 0.2) 1px, transparent 1px),
          linear-gradient(90deg, rgba(30, 41, 59, 0.14) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      .top-ticker {
        position: sticky;
        top: 0;
        z-index: 30;
        height: 40px;
        display: flex;
        align-items: center;
        border-bottom: 1px solid var(--line);
        background: rgba(2, 6, 23, 0.95);
        backdrop-filter: blur(6px);
        overflow: hidden;
      }

      .container {
        width: min(1680px, 100%);
        margin: 0 auto;
        padding: 0 16px;
      }

      .ticker-inner {
        display: flex;
        align-items: center;
        gap: 14px;
        height: 100%;
        overflow: hidden;
      }

      .ticker-label {
        flex: 0 0 auto;
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--blue);
        white-space: nowrap;
      }

      .ticker-track-wrap {
        overflow: hidden;
        min-width: 0;
        flex: 1;
      }

      .ticker-track {
        display: inline-flex;
        gap: 26px;
        white-space: nowrap;
        color: var(--muted);
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
        font-size: 11px;
        animation: marquee 30s linear infinite;
        padding-right: 26px;
      }

      .ticker-up {
        color: var(--red);
        font-weight: 700;
      }

      .ticker-down {
        color: var(--green);
        font-weight: 700;
      }

      @keyframes marquee {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }

      .layout {
        display: grid;
        grid-template-columns: 2fr 7fr 3fr;
        gap: 16px;
        padding: 16px 0 22px;
      }

      .panel {
        border: 1px solid var(--line);
        background: rgba(15, 23, 42, 0.7);
        border-radius: 12px;
        box-shadow: 0 16px 36px rgba(2, 6, 23, 0.45);
      }

      .left-panel,
      .right-panel {
        align-self: start;
      }

      .left-panel {
        padding: 12px;
      }

      .search-box {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(2, 6, 23, 0.6);
        padding: 8px 10px;
        margin-bottom: 12px;
      }

      .search-box span {
        color: var(--muted);
        font-size: 14px;
      }

      .search-box input {
        width: 100%;
        border: none;
        outline: none;
        background: transparent;
        color: var(--text);
        font-size: 14px;
      }

      .search-box input::placeholder {
        color: #64748b;
      }

      .filters {
        display: grid;
        gap: 6px;
      }

      .filter-btn {
        border: none;
        background: transparent;
        border-radius: 8px;
        color: #cbd5e1;
        text-align: left;
        padding: 9px 10px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
      }

      .filter-btn:hover {
        background: rgba(30, 41, 59, 0.8);
        color: #fff;
      }

      .filter-btn.active {
        background: #0369a1;
        color: #fff;
        font-weight: 700;
      }

      .filter-meta {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 9px 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .filter-meta b {
        color: var(--blue);
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
      }

      .main-panel {
        padding: 16px;
      }

      .main-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 14px;
      }

      .main-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 22px;
        font-weight: 700;
        margin: 0;
      }

      .main-title .zap {
        color: #f59e0b;
      }

      .update-tip {
        color: var(--muted);
        font-size: 12px;
      }

      .timeline {
        position: relative;
        margin-left: 6px;
        border-left: 1px solid var(--line);
        padding-left: 20px;
      }

      .news-item {
        position: relative;
        margin-bottom: 16px;
      }

      .news-item:last-child {
        margin-bottom: 0;
      }

      .news-dot {
        position: absolute;
        left: -25px;
        top: 7px;
        width: 10px;
        height: 10px;
        border-radius: 999px;
        box-shadow: 0 0 0 4px var(--bg);
      }

      .dot-up {
        background: var(--red);
      }

      .dot-down {
        background: var(--blue);
      }

      .news-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
      }

      .meta-time {
        font-size: 11px;
        color: var(--muted);
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
      }

      .pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        font-size: 10px;
        line-height: 1;
        padding: 4px 7px;
        font-weight: 700;
      }

      .pill-cn {
        border-color: rgba(239, 68, 68, 0.35);
        color: var(--red);
        background: rgba(239, 68, 68, 0.1);
      }

      .pill-global {
        border-color: rgba(56, 189, 248, 0.35);
        color: var(--blue);
        background: rgba(56, 189, 248, 0.1);
      }

      .pill-neutral {
        color: var(--muted);
        background: rgba(15, 23, 42, 0.9);
      }

      .pill-report {
        border-color: rgba(245, 158, 11, 0.35);
        color: #fbbf24;
        background: rgba(245, 158, 11, 0.12);
      }

      .pill-account {
        border-color: rgba(34, 197, 94, 0.35);
        color: #86efac;
        background: rgba(34, 197, 94, 0.12);
      }

      .news-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(2, 6, 23, 0.45);
        padding: 14px;
        transition: all 0.2s;
      }

      .news-card:hover {
        border-color: rgba(56, 189, 248, 0.45);
        background: rgba(15, 23, 42, 0.75);
      }

      .news-title {
        margin: 0 0 7px;
        font-size: 18px;
        line-height: 1.45;
      }

      .news-summary {
        margin: 0 0 10px;
        color: #cbd5e1;
        line-height: 1.6;
        font-size: 14px;
      }

      .news-source {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .news-source a {
        color: #7dd3fc;
        text-decoration: none;
        border-bottom: 1px dashed rgba(125, 211, 252, 0.55);
      }

      .news-source a:hover {
        color: #bae6fd;
        border-bottom-color: #bae6fd;
      }

      .impact-bar {
        width: 100%;
        height: 6px;
        border-radius: 999px;
        overflow: hidden;
        background: #1e293b;
        margin-bottom: 10px;
      }

      .impact-fill {
        height: 100%;
      }

      .impact-up {
        background: var(--red);
      }

      .impact-down {
        background: var(--blue);
      }

      .news-footer {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .stock-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .stock-pill {
        border: 1px solid rgba(56, 189, 248, 0.32);
        border-radius: 7px;
        background: rgba(56, 189, 248, 0.1);
        color: #7dd3fc;
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
        font-size: 11px;
        padding: 4px 7px;
      }

      .impact-label {
        font-size: 12px;
        font-weight: 700;
      }

      .impact-label.up {
        color: var(--red);
      }

      .impact-label.down {
        color: var(--blue);
      }

      .empty {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 14px;
        color: var(--muted);
        font-size: 14px;
      }

      .right-panel {
        display: grid;
        gap: 16px;
      }

      .right-block {
        padding: 14px;
      }

      .investing-widget-wrap {
        border: 1px solid rgba(30, 41, 59, 0.8);
        border-radius: 10px;
        overflow: hidden;
        background: #ffffff;
      }

      .investing-widget-wrap iframe {
        width: 100%;
        height: 500px;
        border: 0;
        display: block;
        background: #ffffff;
      }

      .investing-fallback {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }

      .investing-fallback a {
        color: #7dd3fc;
        text-decoration: none;
      }

      .block-title {
        margin: 0 0 12px;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .watch-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(30, 41, 59, 0.8);
        padding-bottom: 10px;
        margin-bottom: 10px;
      }

      .watch-item:last-child {
        border-bottom: none;
        padding-bottom: 0;
        margin-bottom: 0;
      }

      .watch-name {
        font-size: 14px;
        font-weight: 700;
      }

      .watch-code,
      .watch-price {
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
      }

      .watch-code {
        color: var(--muted);
        font-size: 11px;
      }

      .watch-price {
        font-size: 14px;
      }

      .watch-change {
        text-align: right;
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
        font-size: 11px;
        font-weight: 700;
      }

      .watch-change.up {
        color: var(--red);
      }

      .watch-change.down {
        color: var(--green);
      }

      .watch-change.flat {
        color: var(--muted);
      }

      .calendar-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 10px;
      }

      .calendar-item {
        display: flex;
        align-items: flex-start;
        gap: 9px;
      }

      .calendar-date {
        flex: 0 0 auto;
        border: 1px solid rgba(56, 189, 248, 0.32);
        background: rgba(56, 189, 248, 0.1);
        color: #7dd3fc;
        border-radius: 999px;
        font-size: 11px;
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
        padding: 4px 8px;
      }

      .calendar-event {
        font-size: 14px;
      }

      .calendar-focus {
        color: var(--muted);
        font-size: 11px;
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
      }

      @media (max-width: 1200px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .main-panel {
          order: 1;
        }

        .left-panel {
          order: 2;
        }

        .right-panel {
          order: 3;
        }

        .main-title {
          font-size: 20px;
        }
      }

      @media (max-width: 640px) {
        .container {
          padding: 0 10px;
        }

        .layout {
          gap: 12px;
          padding: 12px 0 16px;
        }

        .main-panel,
        .left-panel,
        .right-block {
          padding: 12px;
        }

        .news-title {
          font-size: 16px;
        }
      }
    </style>
  </head>

        const hour = String(date.getHours()).padStart(2, "0");
        const minute = String(date.getMinutes()).padStart(2, "0");
        return `${year}-${month}-${day} ${hour}:${minute}`;
      }

      function truncateText(text, maxLen) {
        const value = String(text || "").trim();
        if (value.length <= maxLen) return value;
        return `${value.slice(0, maxLen - 1)}…`;
      }

      function cleanFeedText(text) {
        return String(text || "")
          .replace(/\s+/g, "")
          .replace(/^财联社\d+月\d+日电，?/, "")
          .replace(/^《科创板日报》\d+日讯，?/, "")
          .trim();
      }

      function normalizeSummary(rawSummary) {
        const cleaned = cleanFeedText(rawSummary);
        const parts = cleaned.split("。").filter(Boolean).slice(0, 2);
        const merged = parts.join("。");
        return truncateText(merged ? `${merged}。` : cleaned, 220);
      }

      function normalizeTitle(rawTitle, rawSummary) {
        let title = String(rawTitle || "")
          .replace(/\s+/g, " ")
          .trim();
        const summary = normalizeSummary(rawSummary).replace(/。$/, "");
        if (!title || /^\d{1,2}:\d{2}$/.test(title)) {
          title = summary.split("，").slice(0, 2).join("，");
        }
        return truncateText(
          title.replace(/^(财联社|金十快讯|同花顺7x24)[：:]\s*/, "") || "存储行业快讯",
          42
        );
      }

      function extractRelatedCompanies(text) {
        const hits = [];
        const targetText = String(text || "");
        Object.entries(COMPANY_ALIAS_MAP).forEach(([company, aliases]) => {
          if (aliases.some((alias) => targetText.includes(alias))) {
            hits.push(company);
          }
        });
        return hits.slice(0, 4);
      }

      function inferRegion(relatedCompanies) {
        const cnSet = new Set(["德明利", "兆易创新", "江波龙", "佰维存储", "澜起科技", "香农芯创"]);
        const usSet = new Set(["闪迪", "美光", "希捷科技", "西部数据"]);
        if (relatedCompanies.some((item) => cnSet.has(item))) return "中国";
        if (relatedCompanies.some((item) => item === "海力士" || item === "三星电子")) return "韩国";
        if (relatedCompanies.includes("铠侠")) return "日本";
        if (relatedCompanies.some((item) => usSet.has(item))) return "美国";
        return "全球";
      }

      function inferCategory(text) {
        if (/HBM/i.test(text)) return "HBM";
        if (/DRAM|内存/i.test(text)) return "DRAM";
        if (/NAND|闪存|SSD/i.test(text)) return "NAND";
        return "存储";
      }

      function inferMarketScope(relatedCompanies) {
        const cnSet = new Set(["德明利", "兆易创新", "江波龙", "佰维存储", "澜起科技", "香农芯创"]);
        return relatedCompanies.some((item) => cnSet.has(item)) ? "A-Share" : "Global";
      }

      function inferItemType(text) {
        if (/研报|机构|评级|券商|看好|目标价/i.test(text)) return "研报解读";
        if (/公告|发布|披露|业绩|预告|签署|合同|纳入|派息/i.test(text)) return "公司动态";
        return "股价涨跌";
      }

      function inferImpactScore(text) {
        if (/涨停|涨超|大涨|走强|新高|预增|高增|跻身|纳入|拉升/i.test(text)) return 0.6;
        if (/下跌|走弱|回落|下滑|跌幅|转弱/i.test(text)) return -0.35;
        return 0.2;
      }

      function buildRelatedStocks(relatedCompanies) {
        return relatedCompanies.map((item) => COMPANY_STOCK_MAP[item]).filter(Boolean).slice(0, 4);
      }

      function parseClsFeed(htmlText) {
        const doc = new DOMParser().parseFromString(htmlText, "text/html");
        const rows = [];
        const items = doc.querySelectorAll("li.b-m-w-20.s-subject-list");
        items.forEach((item, index) => {
          const rawTitle = item.querySelector(".s-content-list-link span")?.textContent || "";
          const rawSummary = item.querySelector(".s-subject-list-text pre")?.textContent || "";
          const href = item.querySelector(".s-content-list-link")?.getAttribute("href") || "";
          const articleId = href.match(/\/share\/article\/(\d+)/)?.[1];
          const ctime = Number(item.querySelector(".content-list-ctime")?.getAttribute("data-ctime") || 0);
          if (!articleId || !ctime) return;

          const title = normalizeTitle(rawTitle, rawSummary);
          const summary = normalizeSummary(rawSummary);
          const blob = `${title} ${summary}`;
          const relatedCompanies = extractRelatedCompanies(blob);
          if (!relatedCompanies.length) return;

          rows.push({
            id: 2000 + index,
            timestamp: formatTimestamp(new Date(ctime * 1000)),
            region: inferRegion(relatedCompanies),
            title,
            summary,
            source: "财联社（存储芯片专题）",
            source_url: `https://www.cls.cn/detail/${articleId}`,
            impact_score: inferImpactScore(blob),
            related_stocks: buildRelatedStocks(relatedCompanies),
            related_companies: relatedCompanies,
            category: inferCategory(blob),
            market_scope: inferMarketScope(relatedCompanies),
            item_type: inferItemType(blob),
          });
        });
        return rows.sort((a, b) => parseTimestamp(b.timestamp) - parseTimestamp(a.timestamp));
      }

      function normalizeNewsTitleKey(title) {
        return String(title || "")
          .toLowerCase()
          .replace(/[\s\-—:：,，。！!？?、“”"'"()\[\]【】]/g, "")
          .replace(/^(快讯|研报|公告)/, "");
      }

      function mergeTagLists(a, b, limit = 4) {
        return Array.from(new Set([...(a || []), ...(b || [])])).slice(0, limit);
      }

      function mergeNewsData(dynamicRows) {
        const byLink = new Map();
        const sourceRows = Array.isArray(dynamicRows) ? dynamicRows : [];
        [...sourceRows]
          .filter((item) => item && item.title && item.timestamp)
          .filter((item) => !isBlockedTencentSource(item.source))
          .forEach((item) => {
            const key = item.source_url || `${item.timestamp}-${normalizeNewsTitleKey(item.title)}`;
            if (!byLink.has(key)) {
              byLink.set(key, { ...item });
              return;
            }
            const old = byLink.get(key);
            byLink.set(key, {
              ...old,
              related_companies: mergeTagLists(old.related_companies, item.related_companies),
              related_stocks: mergeTagLists(old.related_stocks, item.related_stocks),
            });
          });

        const byTitle = new Map();
        Array.from(byLink.values())
          .sort((a, b) => parseTimestamp(b.timestamp) - parseTimestamp(a.timestamp))
          .forEach((item) => {
            const titleKey = normalizeNewsTitleKey(item.title);
            if (!titleKey) return;
            if (!byTitle.has(titleKey)) {
              byTitle.set(titleKey, item);
              return;
            }
            const old = byTitle.get(titleKey);
            byTitle.set(titleKey, {
              ...old,
              related_companies: mergeTagLists(old.related_companies, item.related_companies),
              related_stocks: mergeTagLists(old.related_stocks, item.related_stocks),
            });
          });

        return Array.from(byTitle.values())
          .sort((a, b) => parseTimestamp(b.timestamp) - parseTimestamp(a.timestamp))
          .slice(0, 60);
      }

      function renderTicker() {
        const rows = TICKER_DATA.concat(TICKER_DATA)
          .map((item) => {
            const cls = item.change.startsWith("+") ? "ticker-up" : "ticker-down";
            return `<span>${item.name}: <b class="${cls}">${item.value} (${item.change})</b></span>`;
          })
          .join("");
        tickerTrack.innerHTML = rows;
      }

      function renderFilters() {
        filterList.innerHTML = FILTERS.map((filter) => {
          const activeClass = state.activeFilter === filter ? "active" : "";
          const label = filter === "All" ? "全部" : filter;
          return `<button class="filter-btn ${activeClass}" data-filter="${filter}">${label}</button>`;
        }).join("");

        filterList.querySelectorAll(".filter-btn").forEach((button) => {
          button.addEventListener("click", () => {
            state.activeFilter = button.dataset.filter;
            renderFilters();
            renderNews();
          });
        });
      }

      function getFilteredNews() {
        const query = state.searchText.trim().toLowerCase();

        return newsData
          .filter((item) => !isBlockedTencentSource(item.source))
          .filter((item) => {
            const matchesFilter =
              state.activeFilter === "All" || (item.related_companies || []).includes(state.activeFilter);
            if (!matchesFilter) return false;
            if (!query) return true;

            const text = [
              item.title,
              item.summary,
              item.item_type || "",
              item.source || "",
              item.source_url || "",
              item.region || "",
              item.category || "",
              item.market_scope || "",
              (item.related_companies || []).join(" "),
              (item.related_stocks || []).join(" "),
            ]
              .join(" ")
              .toLowerCase();

            return text.includes(query);
          })
          .sort((a, b) => parseTimestamp(b.timestamp) - parseTimestamp(a.timestamp));
      }

      function renderNews() {
        const rows = getFilteredNews();
        hitCount.textContent = rows.length;

        if (!rows.length) {
          timeline.innerHTML = '<div class="empty">暂无匹配快讯，请调整筛选条件或搜索关键词。</div>';
          return;
        }

        timeline.innerHTML = rows
          .map((news) => {
            const positive = Number(news.impact_score || 0) >= 0;
            const dotClass = positive ? "dot-up" : "dot-down";
            const [date, time] = String(news.timestamp).split(" ");

            return `
              <article class="news-item">
                <div class="news-dot ${dotClass}"></div>
                <div class="news-meta">
                  <span class="meta-time">${(date || "").slice(5)} ${time || ""}</span>
                </div>

                <div class="news-card">
                  <h2 class="news-title">${news.title}</h2>
                  <p class="news-summary">${news.summary}</p>

                  ${
                    news.source && news.source_url
                      ? `<p class="news-source">来源：<span>${news.source}</span> · <a href="${news.source_url}" target="_blank" rel="noopener noreferrer">原文链接</a></p>`
                      : ""
                  }

                  <div class="news-footer">
                    <div class="stock-list">
                      ${(news.related_companies || [])
                        .slice(0, 4)
                        .map((name) => `<span class="stock-pill">${name}</span>`)
                        .join("")}
                    </div>
                  </div>
                </div>
              </article>
            `;
          })
          .join("");
      }

      function renderWatchlist() {
        watchList.innerHTML = windMarketData
          .map((stock) => {
            let directionClass = "flat";
            if ((stock.change || "").includes("+")) directionClass = "up";
            else if ((stock.change || "").includes("-")) directionClass = "down";

            return `
              <div class="watch-item">
                <div>
                  <div class="watch-name">${stock.name}</div>
                  <div class="watch-code">${stock.code}</div>
                </div>
                <div>
                  <div class="watch-price">${stock.price || "--"}</div>
                  <div class="watch-change ${directionClass}">${stock.change || "跟踪中"}</div>
                </div>
              </div>
            `;
          })
          .join("");
      }

      function formatQuotePrice(code, rawPrice) {
        const value = Number(rawPrice);
        if (!Number.isFinite(value)) return "--";
        if (code.endsWith(".US")) return `$${value.toFixed(2)}`;
        return value.toFixed(2);
      }

      function formatQuoteChange(rawPct) {
        const value = Number(rawPct);
        if (!Number.isFinite(value)) return "跟踪中";
        const prefix = value > 0 ? "+" : "";
        return `${prefix}${value.toFixed(2)}%`;
      }

      function parseQuoteTimestamp(raw) {
        if (!raw) return "";
        if (/^\d{14}$/.test(raw)) {
          return `${raw.slice(0, 4)}-${raw.slice(4, 6)}-${raw.slice(6, 8)} ${raw.slice(8, 10)}:${raw.slice(
            10,
            12
          )}:${raw.slice(12, 14)}`;
        }
        return raw;
      }

      function parseTencentQuotePayload(text) {
        const map = new Map();
        String(text)
          .split(";")
          .map((line) => line.trim())
          .forEach((line) => {
            const match = line.match(/^v_([^=]+)="(.*)"$/);
            if (!match) return;
            const quoteKey = match[1];
            const fields = match[2].split("~");
            map.set(quoteKey, {
              price: fields[3],
              changeAbs: fields[31],
              changePct: fields[32],
              timeRaw: fields[30],
            });
          });
        return map;
      }

      function buildCodetabsProxyUrl(url) {
        return `${CLS_CODETABS_PROXY_URL}${encodeURIComponent(url)}`;
      }

      async function fetchTextWithTimeout(url, timeoutMs = 8000) {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), timeoutMs);
        try {
          const response = await fetch(url, { cache: "no-store", signal: controller.signal });
          if (!response.ok) return "";
          return await response.text();
        } catch (error) {
          return "";
        } finally {
          clearTimeout(timeout);
        }
      }

      function clearWindowKey(key) {
        try {
          delete window[key];
        } catch (error) {
          window[key] = undefined;
        }
      }

      async function loadScriptWithTimeout(url, timeoutMs = 8000) {
        return new Promise((resolve) => {
          const script = document.createElement("script");
          let settled = false;
          const finish = (ok) => {
            if (settled) return;
            settled = true;
            clearTimeout(timeout);
            script.onload = null;
            script.onerror = null;
            if (script.parentNode) script.parentNode.removeChild(script);
            resolve(ok);
          };
          const timeout = setTimeout(() => finish(false), timeoutMs);
          script.async = true;
          script.src = url;
          script.onload = () => finish(true);
          script.onerror = () => finish(false);
          document.head.appendChild(script);
        });
      }

      async function fetchTencentQuoteMapViaScript() {
        const keys = WATCHLIST_COMPANIES.map((meta) => `v_${meta.quoteKey}`);
        keys.forEach((key) => clearWindowKey(key));
        const ok = await loadScriptWithTimeout(`${TENCENT_QUOTE_URL}&_t=${Date.now()}`, 9000);
        if (!ok) return new Map();
        const payload = keys.map((key) => `${key}="${String(window[key] || "")}"`).join(";");
        keys.forEach((key) => clearWindowKey(key));
        return parseTencentQuotePayload(payload);
      }

      function buildTencentNewsUrl(companyItem, variableName) {
        return (
          `${TENCENT_NEWS_API_URL}?page=1&symbol=${encodeURIComponent(companyItem.symbol)}` +
          `&n=20&_var=${encodeURIComponent(variableName)}&type=2&_t=${Date.now()}`
        );
      }

      async function fetchTencentNewsPayloadViaScript(companyItem) {
        const safeSymbol = String(companyItem?.symbol || "news").replace(/[^a-zA-Z0-9_]/g, "_");
        const variableName = `__seminews_${safeSymbol}_${Date.now()}_${Math.floor(Math.random() * 10000)}`;
        clearWindowKey(variableName);
        const ok = await loadScriptWithTimeout(buildTencentNewsUrl(companyItem, variableName), 9000);
        const payload = ok ? window[variableName] : null;
        clearWindowKey(variableName);
        if (!payload || typeof payload !== "object") return null;
        return payload;
      }

      async function loadWindData() {
        try {
          const response = await fetch(`./wind_quotes.json?v=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) return;
          const payload = await response.json();
          const rows = Array.isArray(payload) ? payload : Array.isArray(payload?.data) ? payload.data : [];
          const normalized = WATCHLIST_COMPANIES.map((meta) => {
            const hit = rows.find((item) => item && item.code === meta.code);
            return {
              name: meta.name,
              code: meta.code,
              price: hit?.price || "--",
              change: hit?.change || "跟踪中",
            };
          });
          if (normalized.some((item) => item.price !== "--" || item.change !== "跟踪中")) {
            windMarketData = normalized;
            renderWatchlist();
          }
          if (payload?.updated_at) {
            watchUpdated.textContent = payload.updated_at;
          }
        } catch (error) {
          // Keep fallback data when local wind export is unavailable.
        }
      }

      async function loadRealtimeQuoteData() {
        try {
          let quoteMap = new Map();
          const payload = await fetchTextWithTimeout(`${TENCENT_QUOTE_URL}&_t=${Date.now()}`, 9000);
          if (payload) {
            quoteMap = parseTencentQuotePayload(payload);
          }
          if (!quoteMap.size) {
            quoteMap = await fetchTencentQuoteMapViaScript();
          }
          if (!quoteMap.size) return;

          let latestTime = "";
          windMarketData = WATCHLIST_COMPANIES.map((meta) => {
            const quote = quoteMap.get(meta.quoteKey);
            if (!quote) {
              const oldValue = windMarketData.find((item) => item.code === meta.code);
              return oldValue || { name: meta.name, code: meta.code, price: "--", change: "跟踪中" };
            }
            const normalizedTime = parseQuoteTimestamp(quote.timeRaw);
            if (normalizedTime && normalizedTime > latestTime) latestTime = normalizedTime;
            return {
              name: meta.name,
              code: meta.code,
              price: formatQuotePrice(meta.code, quote.price),
              change: formatQuoteChange(quote.changePct),
            };
          });

          renderWatchlist();
          if (latestTime) {
            watchUpdated.textContent = latestTime;
          } else {
            watchUpdated.textContent = formatClock(new Date());
          }
        } catch (error) {
          // Realtime quote fetch can fail due network limits; keep current data.
        }
      }

      function parseTencentNewsJsonp(text) {
        const start = String(text || "").indexOf("{");
        if (start < 0) return null;
        const raw = String(text || "")
          .slice(start)
          .trim()
          .replace(/;$/, "");
        try {
          return JSON.parse(raw);
        } catch (error) {
          return null;
        }
      }

      function isBlockedTencentSource(source) {
        const value = String(source || "").trim();
        if (!value) return false;
        return Array.from(BLOCKED_TENCENT_SOURCES).some((blocked) => value.includes(blocked));
      }

      function extractTencentRelatedCompanies(item, fallbackCompany, textBlob) {
        const set = new Set();
        const rawSymbols = [];
        if (item?.symbol) rawSymbols.push(item.symbol);
        if (Array.isArray(item?.symbols)) rawSymbols.push(...item.symbols);
        if (typeof item?.symbols === "string") rawSymbols.push(...item.symbols.split(","));
        rawSymbols.forEach((symbol) => {
          const key = String(symbol || "").trim().toLowerCase();
          if (TENCENT_SYMBOL_TO_COMPANY.has(key)) {
            set.add(TENCENT_SYMBOL_TO_COMPANY.get(key));
          }
        });
        if (fallbackCompany) set.add(fallbackCompany);
        extractRelatedCompanies(textBlob).forEach((company) => set.add(company));
        return Array.from(set).slice(0, 4);
      }

      function normalizeTencentNewsItem(item, fallbackCompany, index) {
        const source = String(item?.src || "").trim();
        if (isBlockedTencentSource(source)) return null;

        const title = truncateText(String(item?.title || "").trim(), 46);
        if (!title) return null;

        const summary = normalizeSummary(String(item?.summary || "").trim() || title);
        const blob = `${title} ${summary}`;
        const relatedCompanies = extractTencentRelatedCompanies(item, fallbackCompany, blob);
        if (!relatedCompanies.length) return null;

        let timestamp = String(item?.time || "").trim();
        if (/^\d{4}-\d{2}-\d{2}$/.test(timestamp)) {
          timestamp = `${timestamp} 00:00`;
        }
        if (!/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}/.test(timestamp)) {
          timestamp = formatTimestamp(new Date());
        }

        const sourceUrl = String(item?.url || "")
          .replace(/^http:\/\//, "https://")
          .trim();

        return {
          id: item?.id || `tx-${fallbackCompany}-${index}`,
          timestamp,
          region: inferRegion(relatedCompanies),
          title,
          summary,
          source: source || "未标注来源",
          source_url: sourceUrl,
          impact_score: inferImpactScore(blob),
          related_stocks: buildRelatedStocks(relatedCompanies),
          related_companies: relatedCompanies,
          category: inferCategory(blob),
          market_scope: inferMarketScope(relatedCompanies),
          item_type: inferItemType(blob),
        };
      }

      async function fetchTencentNewsByCompany(companyItem) {
        let payload = null;
        const fetchVariable = `finance_notice_${Date.now()}_${Math.floor(Math.random() * 10000)}`;
        const fetchUrl = buildTencentNewsUrl(companyItem, fetchVariable);
        const text = await fetchTextWithTimeout(fetchUrl, 9000);
        if (text) {
          payload = parseTencentNewsJsonp(text);
        }
        if (!payload || payload.code !== 0) {
          payload = await fetchTencentNewsPayloadViaScript(companyItem);
        }
        if (!payload || payload.code !== 0) return [];
        const rows = payload?.data?.data || [];
        return rows
          .map((item, index) => normalizeTencentNewsItem(item, companyItem.company, index))
          .filter(Boolean);
      }

      async function loadTencentStockNewsRows() {
        const tasks = TENCENT_NEWS_COMPANIES.map((item) => fetchTencentNewsByCompany(item));
        const results = await Promise.allSettled(tasks);
        const rows = [];
        results.forEach((result) => {
          if (result.status === "fulfilled" && Array.isArray(result.value)) {
            rows.push(...result.value);
          }
        });
        return rows
          .sort((a, b) => parseTimestamp(b.timestamp) - parseTimestamp(a.timestamp))
          .slice(0, 160);
      }

      async function loadLatestDomesticNews() {
        const tencentRowsPromise = loadTencentStockNewsRows();
        let clsRows = [];
        const urls = [buildCodetabsProxyUrl(CLS_SUBJECT_URL), CLS_PROXY_URL, CLS_SUBJECT_URL];
        for (const url of urls) {
          const htmlText = await fetchTextWithTimeout(url, 9000);
          if (!htmlText) continue;
          const dynamicRows = parseClsFeed(htmlText);
          if (dynamicRows.length) {
            clsRows = dynamicRows;
            break;
          }
        }

        let tencentRows = await tencentRowsPromise;
        const hasFreshTencentRows = tencentRows.length > 0;
        if (hasFreshTencentRows) {
          tencentRowsCache = tencentRows;
          tencentRowsCacheSavedAt = Date.now();
        } else if (
          !clsRows.length &&
          tencentRowsCache.length &&
          Date.now() - tencentRowsCacheSavedAt <= TENCENT_NEWS_CACHE_MAX_AGE_MS
        ) {
          tencentRows = tencentRowsCache;
        }
        const usingCachedTencentRows = !hasFreshTencentRows && tencentRows.length > 0;

        const mergedRows = mergeNewsData([...tencentRows, ...clsRows]);
        if (!mergedRows.length) {
          newsData = [];
          renderNews();
          newsUpdated.textContent = `${formatTimestamp(new Date())}（未获取到实时数据，请稍后自动重试）`;
          return;
        }

        newsData = mergedRows;
        renderNews();

        const sourceFlags = [];
        if (tencentRows.length) {
          sourceFlags.push(
            usingCachedTencentRows ? `腾讯来源 缓存${tencentRows.length}` : `腾讯来源 ${tencentRows.length}`
          );
        }
        if (clsRows.length) sourceFlags.push(`财联社${clsRows.length}`);
        const latestTimestamp = parseTimestamp(mergedRows[0].timestamp).getTime();
        if (latestTimestamp > 0) {
          const lagMinutes = Math.max(0, Math.round((Date.now() - latestTimestamp) / (1000 * 60)));
          sourceFlags.push(`最晚${lagMinutes}分钟前`);
        }
        newsUpdated.textContent = `${formatTimestamp(new Date())}（${sourceFlags.join(" / ") || "已刷新"}）`;
      }

      function renderCalendar() {
        calendarList.innerHTML = CALENDAR.map((item) => {
          return `
            <li class="calendar-item">
              <span class="calendar-date">${item.date}</span>
              <div>
                <div class="calendar-event">${item.event}</div>
                <div class="calendar-focus">${item.focus}</div>
              </div>
            </li>
          `;
        }).join("");
      }

      function updateClock() {
        clock.textContent = formatClock(new Date());
      }

      searchInput.addEventListener("input", (event) => {
        state.searchText = event.target.value;
        renderNews();
      });

      renderTicker();
      renderFilters();
      renderNews();
      renderWatchlist();
      renderCalendar();
      updateClock();
      newsUpdated.textContent = "等待首次拉取";
      watchUpdated.textContent = "等待刷新";

      loadWindData();
      loadRealtimeQuoteData();
      loadLatestDomesticNews();
      setTimeout(loadLatestDomesticNews, 6000);

      setInterval(updateClock, 1000);
      setInterval(loadRealtimeQuoteData, 60000);
      setInterval(loadLatestDomesticNews, 120000);

      window.addEventListener("focus", () => {
        loadLatestDomesticNews();
      });
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) loadLatestDomesticNews();
      });
    </script>
  </body>
</html>
