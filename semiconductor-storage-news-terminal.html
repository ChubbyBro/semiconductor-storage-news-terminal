<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semiconductor Storage Financial Terminal</title>
    <style>
      :root {
        --bg: #020617;
        --line: #1e293b;
        --text: #f8fafc;
        --muted: #94a3b8;
        --red: #ef4444;
        --blue: #38bdf8;
        --green: #22c55e;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "IBM Plex Sans", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      }

      body {
        background-image: linear-gradient(rgba(30, 41, 59, 0.2) 1px, transparent 1px),
          linear-gradient(90deg, rgba(30, 41, 59, 0.14) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      .top-ticker {
        position: sticky;
        top: 0;
        z-index: 30;
        height: 40px;
        display: flex;
        align-items: center;
        border-bottom: 1px solid var(--line);
        background: rgba(2, 6, 23, 0.95);
        backdrop-filter: blur(6px);
        overflow: hidden;
      }

      .container {
        width: min(1680px, 100%);
        margin: 0 auto;
        padding: 0 16px;
      }

      .ticker-inner {
        display: flex;
        align-items: center;
        gap: 14px;
        height: 100%;
        overflow: hidden;
      }

      .ticker-label {
        flex: 0 0 auto;
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--blue);
        white-space: nowrap;
      }

      .ticker-track-wrap {
        overflow: hidden;
        min-width: 0;
        flex: 1;
      }

      .ticker-track {
        display: inline-flex;
        gap: 26px;
        white-space: nowrap;
        color: var(--muted);
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
        font-size: 11px;
        animation: marquee 30s linear infinite;
        padding-right: 26px;
      }

      .ticker-up {
        color: var(--red);
        font-weight: 700;
      }

      .ticker-down {
        color: var(--green);
        font-weight: 700;
      }

      @keyframes marquee {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }

      .layout {
        display: grid;
        grid-template-columns: 2fr 7fr 3fr;
        gap: 16px;
        padding: 16px 0 22px;
      }

      .panel {
        border: 1px solid var(--line);
        background: rgba(15, 23, 42, 0.7);
        border-radius: 12px;
        box-shadow: 0 16px 36px rgba(2, 6, 23, 0.45);
      }

      .left-panel,
      .right-panel {
        align-self: start;
      }

      .left-panel {
        padding: 12px;
      }

      .search-box {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(2, 6, 23, 0.6);
        padding: 8px 10px;
        margin-bottom: 12px;
      }

      .search-box span {
        color: var(--muted);
        font-size: 14px;
      }

      .search-box input {
        width: 100%;
        border: none;
        outline: none;
        background: transparent;
        color: var(--text);
        font-size: 14px;
      }

      .search-box input::placeholder {
        color: #64748b;
      }

      .filters {
        display: grid;
        gap: 6px;
      }

      .filter-btn {
        border: none;
        background: transparent;
        border-radius: 8px;
        color: #cbd5e1;
        text-align: left;
        padding: 9px 10px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
      }

      .filter-btn:hover {
        background: rgba(30, 41, 59, 0.8);
        color: #fff;
      }

      .filter-btn.active {
        background: #0369a1;
        color: #fff;
        font-weight: 700;
      }

      .filter-meta {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 9px 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .filter-meta b {
        color: var(--blue);
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
      }

      .main-panel {
        padding: 16px;
      }

      .main-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 14px;
      }

      .main-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 22px;
        font-weight: 700;
        margin: 0;
      }

      .main-title .zap {
        color: #f59e0b;
      }

      .update-tip {
        color: var(--muted);
        font-size: 12px;
      }

      .timeline {
        position: relative;
        margin-left: 6px;
        border-left: 1px solid var(--line);
        padding-left: 20px;
      }

      .news-item {
        position: relative;
        margin-bottom: 16px;
      }

      .news-item:last-child {
        margin-bottom: 0;
      }

      .news-dot {
        position: absolute;
        left: -25px;
        top: 7px;
        width: 10px;
        height: 10px;
        border-radius: 999px;
        box-shadow: 0 0 0 4px var(--bg);
      }

      .dot-up {
        background: var(--red);
      }

      .dot-down {
        background: var(--blue);
      }

      .news-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
      }

      .meta-time {
        font-size: 11px;
        color: var(--muted);
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
      }

      .pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        font-size: 10px;
        line-height: 1;
        padding: 4px 7px;
        font-weight: 700;
      }

      .pill-cn {
        border-color: rgba(239, 68, 68, 0.35);
        color: var(--red);
        background: rgba(239, 68, 68, 0.1);
      }

      .pill-global {
        border-color: rgba(56, 189, 248, 0.35);
        color: var(--blue);
        background: rgba(56, 189, 248, 0.1);
      }

      .pill-neutral {
        color: var(--muted);
        background: rgba(15, 23, 42, 0.9);
      }

      .pill-report {
        border-color: rgba(245, 158, 11, 0.35);
        color: #fbbf24;
        background: rgba(245, 158, 11, 0.12);
      }

      .pill-account {
        border-color: rgba(34, 197, 94, 0.35);
        color: #86efac;
        background: rgba(34, 197, 94, 0.12);
      }

      .news-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(2, 6, 23, 0.45);
        padding: 14px;
        transition: all 0.2s;
      }

      .news-card:hover {
        border-color: rgba(56, 189, 248, 0.45);
        background: rgba(15, 23, 42, 0.75);
      }

      .news-title {
        margin: 0 0 7px;
        font-size: 18px;
        line-height: 1.45;
      }

      .news-summary {
        margin: 0 0 10px;
        color: #cbd5e1;
        line-height: 1.6;
        font-size: 14px;
      }

      .news-source {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .news-source a {
        color: #7dd3fc;
        text-decoration: none;
        border-bottom: 1px dashed rgba(125, 211, 252, 0.55);
      }

      .news-source a:hover {
        color: #bae6fd;
        border-bottom-color: #bae6fd;
      }

      .impact-bar {
        width: 100%;
        height: 6px;
        border-radius: 999px;
        overflow: hidden;
        background: #1e293b;
        margin-bottom: 10px;
      }

      .impact-fill {
        height: 100%;
      }

      .impact-up {
        background: var(--red);
      }

      .impact-down {
        background: var(--blue);
      }

      .news-footer {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .stock-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .stock-pill {
        border: 1px solid rgba(56, 189, 248, 0.32);
        border-radius: 7px;
        background: rgba(56, 189, 248, 0.1);
        color: #7dd3fc;
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
        font-size: 11px;
        padding: 4px 7px;
      }

      .impact-label {
        font-size: 12px;
        font-weight: 700;
      }

      .impact-label.up {
        color: var(--red);
      }

      .impact-label.down {
        color: var(--blue);
      }

      .empty {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 14px;
        color: var(--muted);
        font-size: 14px;
      }

      .right-panel {
        display: grid;
        gap: 16px;
      }

      .right-block {
        padding: 14px;
      }

      .investing-widget-wrap {
        border: 1px solid rgba(30, 41, 59, 0.8);
        border-radius: 10px;
        overflow: hidden;
        background: #ffffff;
      }

      .investing-widget-wrap iframe {
        width: 100%;
        height: 500px;
        border: 0;
        display: block;
        background: #ffffff;
      }

      .investing-fallback {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }

      .investing-fallback a {
        color: #7dd3fc;
        text-decoration: none;
      }

      .block-title {
        margin: 0 0 12px;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .watch-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(30, 41, 59, 0.8);
        padding-bottom: 10px;
        margin-bottom: 10px;
      }

      .watch-item:last-child {
        border-bottom: none;
        padding-bottom: 0;
        margin-bottom: 0;
      }

      .watch-name {
        font-size: 14px;
        font-weight: 700;
      }

      .watch-code,
      .watch-price {
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
      }

      .watch-code {
        color: var(--muted);
        font-size: 11px;
      }

      .watch-price {
        font-size: 14px;
      }

      .watch-change {
        text-align: right;
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
        font-size: 11px;
        font-weight: 700;
      }

      .watch-change.up {
        color: var(--red);
      }

      .watch-change.down {
        color: var(--green);
      }

      .watch-change.flat {
        color: var(--muted);
      }

      .calendar-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 10px;
      }

      .calendar-item {
        display: flex;
        align-items: flex-start;
        gap: 9px;
      }

      .calendar-date {
        flex: 0 0 auto;
        border: 1px solid rgba(56, 189, 248, 0.32);
        background: rgba(56, 189, 248, 0.1);
        color: #7dd3fc;
        border-radius: 999px;
        font-size: 11px;
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
        padding: 4px 8px;
      }

      .calendar-event {
        font-size: 14px;
      }

      .calendar-focus {
        color: var(--muted);
        font-size: 11px;
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
      }

      @media (max-width: 1200px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .main-panel {
          order: 1;
        }

        .left-panel {
          order: 2;
        }

        .right-panel {
          order: 3;
        }

        .main-title {
          font-size: 20px;
        }
      }

      @media (max-width: 640px) {
        .container {
          padding: 0 10px;
        }

        .layout {
          gap: 12px;
          padding: 12px 0 16px;
        }

        .main-panel,
        .left-panel,
        .right-block {
          padding: 12px;
        }

        .news-title {
          font-size: 16px;
        }
      }
    </style>
  </head>

      function parseTimestamp(value) {
        const match = String(value).match(
          /^(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2})(?::(\d{2}))?$/
        );
        if (!match) return new Date(0);
        const year = Number(match[1]);
        const month = Number(match[2]);
        const day = Number(match[3]);
        const hour = Number(match[4]);
        const minute = Number(match[5]);
        const second = Number(match[6] || 0);
        return new Date(year, month - 1, day, hour, minute, second);
      }

      function formatClock(date) {
        return date.toLocaleTimeString("zh-CN", {
          hour12: false,
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      function formatTimestamp(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        const hour = String(date.getHours()).padStart(2, "0");
        const minute = String(date.getMinutes()).padStart(2, "0");
        return `${year}-${month}-${day} ${hour}:${minute}`;
      }

      function truncateText(text, maxLen) {
        const value = String(text || "").trim();
        if (value.length <= maxLen) return value;
        return `${value.slice(0, maxLen - 1)}…`;
      }

      function cleanFeedText(text) {
        return String(text || "")
          .replace(/\s+/g, "")
          .replace(/^财联社\d+月\d+日电，?/, "")
          .replace(/^《科创板日报》\d+日讯，?/, "")
          .trim();
      }

      function normalizeSummary(rawSummary) {
        const cleaned = cleanFeedText(rawSummary);
        const parts = cleaned.split("。").filter(Boolean).slice(0, 2);
        const merged = parts.join("。");
        return truncateText(merged ? `${merged}。` : cleaned, 110);
      }

      function normalizeTitle(rawTitle, rawSummary) {
        let title = String(rawTitle || "")
          .replace(/\s+/g, " ")
          .trim();
        const summary = normalizeSummary(rawSummary).replace(/。$/, "");
        if (!title || /^\d{1,2}:\d{2}$/.test(title)) {
          title = summary.split("，").slice(0, 2).join("，");
        }
        return truncateText(
          title.replace(/^(财联社|金十快讯|同花顺7x24)[：:]\s*/, "") || "存储行业快讯",
          42
        );
      }

        if (relatedCompanies.some((item) => item === "海力士" || item === "三星电子")) return "韩国";
        if (relatedCompanies.includes("铠侠")) return "日本";

        const prefix = value > 0 ? "+" : "";

      function parseQuoteTimestamp(raw) {
        if (!raw) return "";
        if (/^\d{14}$/.test(raw)) {
          return `${raw.slice(0, 4)}-${raw.slice(4, 6)}-${raw.slice(6, 8)} ${raw.slice(8, 10)}:${raw.slice(
            10,
            12
          )}:${raw.slice(12, 14)}`;
        }
        return raw;
      }

      function parseTencentQuotePayload(text) {
        const map = new Map();
        String(text)
          .split(";")
          .map((line) => line.trim())
          .forEach((line) => {
            const match = line.match(/^v_([^=]+)="(.*)"$/);
            if (!match) return;
            const quoteKey = match[1];
            const fields = match[2].split("~");
            map.set(quoteKey, {
              price: fields[3],
              changeAbs: fields[31],
              changePct: fields[32],
              timeRaw: fields[30],
            });
          });
        return map;
      }

              code: meta.code,
              price: hit?.price || "--",
              change: hit?.change || "跟踪中",
            };
          });
          if (normalized.some((item) => item.price !== "--" || item.change !== "跟踪中")) {
            windMarketData = normalized;
            renderWatchlist();
          }
          if (payload?.updated_at) {
            watchUpdated.textContent = payload.updated_at;
          }
        } catch (error) {
          // Keep fallback data when local wind export is unavailable.
        }
      }

      async function loadRealtimeQuoteData() {
        try {
          const response = await fetch(`${TENCENT_QUOTE_URL}&_t=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) return;
          const payload = await response.text();
          const quoteMap = parseTencentQuotePayload(payload);
          if (!quoteMap.size) return;

          let latestTime = "";
          windMarketData = WATCHLIST_COMPANIES.map((meta) => {
            const quote = quoteMap.get(meta.quoteKey);
            if (!quote) {
              const oldValue = windMarketData.find((item) => item.code === meta.code);
              return oldValue || { name: meta.name, code: meta.code, price: "--", change: "跟踪中" };
            }
            const normalizedTime = parseQuoteTimestamp(quote.timeRaw);
            if (normalizedTime && normalizedTime > latestTime) latestTime = normalizedTime;
            return {
              name: meta.name,
              code: meta.code,
              price: formatQuotePrice(meta.code, quote.price),
              change: formatQuoteChange(quote.changePct),
            };
          });

          renderWatchlist();
          if (latestTime) {
            watchUpdated.textContent = latestTime;
          } else {
            watchUpdated.textContent = formatClock(new Date());
          }
        } catch (error) {
          // Realtime quote fetch can fail due network limits; keep current data.
        }
      }

      async function loadLatestDomesticNews() {
        const urls = [CLS_PROXY_URL, CLS_SUBJECT_URL];
        for (const url of urls) {
          try {
            const response = await fetch(url, { cache: "no-store" });
            if (!response.ok) continue;
            const htmlText = await response.text();
            const dynamicRows = parseClsFeed(htmlText);
            if (dynamicRows.length >= 6) {
              newsData = mergeNewsData(dynamicRows);
              renderNews();
              newsUpdated.textContent = formatTimestamp(new Date());
              return;
            }
          } catch (error) {
            // Try next source.
          }
        }
      }

      function renderCalendar() {
        calendarList.innerHTML = CALENDAR.map((item) => {
          return `
            <li class="calendar-item">
              <span class="calendar-date">${item.date}</span>
              <div>
                <div class="calendar-event">${item.event}</div>
                <div class="calendar-focus">${item.focus}</div>
              </div>
            </li>
          `;
        }).join("");
      }

      function updateClock() {
        clock.textContent = formatClock(new Date());
      }

      searchInput.addEventListener("input", (event) => {
        state.searchText = event.target.value;
        renderNews();
      });

      renderTicker();
      renderFilters();
      renderNews();
      renderWatchlist();
      renderCalendar();
      updateClock();
      newsUpdated.textContent = "本地兜底数据";
      watchUpdated.textContent = "等待刷新";

      loadWindData();
      loadRealtimeQuoteData();
      loadLatestDomesticNews();

      setInterval(updateClock, 1000);
      setInterval(loadRealtimeQuoteData, 60000);
      setInterval(loadLatestDomesticNews, 300000);
    </script>
  </body>
</html>
